<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="signup.js" defer></script>

    <style>
        :root {
            --primary-blue: rgb(9, 101, 154);
            --secondary-blue: #4169E1;
            --bg-light: rgba(255, 249, 252, 0.95);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
            --shadow-hover: 0 12px 40px rgba(9,101,154,0.3);
            --text-gray: rgba(168, 166, 166, 0.8);
            --white: #fff;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Poppins', sans-serif; }
        .hero {
            min-height: 100vh;
            background-image: url('laundryimg.jpeg');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: inherit;
            filter: blur(10px);
            z-index: 1;
        }
        .auth-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }
        .lms-title {
            text-align: center;
            color: var(--primary-blue);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-blue);
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8fafc;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(9,101,154,0.1);
        }
        .role-section {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }
        .role-option {
            flex: 1;
            text-align: center;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: var(--white);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-decoration: none;
            display: block;
        }
        .role-option:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .signup-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
            margin: 1rem 0;
        }
        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-gray);
        }
        .auth-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .auth-container { padding: 2rem 1.5rem; }
            .role-section { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="auth-container">
            <h1 class="lms-title">Sign Up</h1>
            <form>
                <div class="form-group">
                    <label for="name">Full Name/Username</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label for="role">Who are you signing up as?</label>
                    <select id="role" name="role" required>
                        <option value="" disabled selected>Select role...</option>
                        <option value="user">User (Customer)</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="signup-btn" formaction="lms ui.html" >Sign Up as User</button>
                <button type="submit" class="signup-btn" formaction="staff.html" style="background: linear-gradient(135deg, #28a745, #20c997);" formnovalidate>Sign Up as Staff</button>
                <div id="error-msg" style="color: red; text-align: center; margin-top: 1rem; display: none;">Wrong sign up! Role does not match button.</div>
            </form>
            <div class="auth-link">
                Have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
