{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-24 text-center">
    <div class="mb-8">
        <h1 class="text-9xl font-black text-indigo-100">{{ code }}</h1>
        <div class="-mt-16">
            <h2 class="text-4xl font-black text-gray-900 mb-4">{{ title }}</h2>
            <p class="text-gray-500 text-lg mb-10 max-w-md mx-auto">{{ message }}</p>
        </div>
    </div>
    
    <div class="flex flex-col md:flex-row justify-center gap-4">
        <a href="{{ url_for('bookings.dashboard') }}" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-indigo-100 hover:scale-105 transition">
            Back to Dashboard
        </a>
        <a href="mailto:support@nilepulse.com" class="bg-white border border-gray-200 text-gray-600 px-8 py-4 rounded-2xl font-black hover:bg-gray-50 transition">
            Report Issue
        </a>
    </div>
</div>
{% endblock %}
